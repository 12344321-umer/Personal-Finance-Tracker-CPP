<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBudget | Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>SmartBudget Dashboard</h1>
        <p>Data sourced from C++ Logic Engine</p>
      </header>

      <section class="summary">
        <div class="card income">
          <h3>Total Income</h3>
          <p id="total-income">Rs. 0</p>
        </div>
        <div class="card expense">
          <h3>Total Expenses</h3>
          <p id="total-expense">Rs. 0</p>
        </div>
        <div class="card balance">
          <h3>Net Balance</h3>
          <p id="net-balance">Rs. 0</p>
        </div>
      </section>

      <section class="history">
        <h2>Transaction History</h2>
        <table id="transaction-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Type</th>
              <th>Category</th>
              <th>Amount</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Data will be injected here by JS -->
          </tbody>
        </table>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
